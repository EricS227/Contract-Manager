<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Contratos</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: grey;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;

        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        
        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/">Início</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/"> Importar CSV</a>
    </div>

    <div class = "container">
          <h1>Gestor de Contratos</h1>

        <form action="/upload_csv" method="POST" enctype="multipart/form-data">
            <h2>Importar Contratos via CSV</h2>
            <input type="file" name="file" accept=".csv" required>
            <button type="submit">Importar Arquivo</button>
        
            <a href="/dashboard">
                <button style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin-bottom: 20px;">
                    Dashboard
                </button>
            </a>
            <label></label>
        </form>

    </div>

</body>
</html>
